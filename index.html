<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Klever Kitchen — Links</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --border: rgba(255,255,255,0.07);
    --gold: #e8b84b;
    --gold-dim: rgba(232,184,75,0.15);
    --white: #f5f5f0;
    --muted: rgba(245,245,240,0.45);
    --tiktok: #ff0050;
    --telegram: #26a5e4;
    --youtube: #ff0000;
    --instagram: #e1306c;
    --website: #e8b84b;
  }

  html, body {
    background: var(--bg);
    min-height: 100vh;
    font-family: 'DM Sans', sans-serif;
    color: var(--white);
    overflow-x: hidden;
  }

  /* Noise grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.35;
  }

  /* Ambient glow */
  body::after {
    content: '';
    position: fixed;
    top: -30%;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(232,184,75,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
  }

  /* ── AVATAR ── */
  .avatar-ring {
    width: 88px;
    height: 88px;
    border-radius: 50%;
    padding: 2px;
    background: conic-gradient(var(--gold), #c8912a, #f5d07a, var(--gold));
    animation: spin 8s linear infinite;
    margin-bottom: 20px;
  }

  .avatar-inner {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 26px;
    color: var(--gold);
    letter-spacing: -1px;
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  /* ── HEADER ── */
  .name {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(22px, 5vw, 30px);
    letter-spacing: -0.5px;
    text-align: center;
    animation: fadeUp 0.6s ease both;
  }

  .tagline {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 6px;
    text-align: center;
    animation: fadeUp 0.7s ease both;
  }

  /* ── DIVIDER ── */
  .divider {
    width: 40px;
    height: 1px;
    background: var(--gold);
    margin: 28px auto;
    opacity: 0.5;
    animation: fadeUp 0.75s ease both;
  }

  /* ── BUTTONS ── */
  .links {
    width: 100%;
    max-width: 400px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .btn {
    position: relative;
    display: flex;
    align-items: center;
    gap: 16px;
    width: 100%;
    padding: 16px 22px;
    border-radius: 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    text-decoration: none;
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    overflow: hidden;
    transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    animation: fadeUp 0.8s ease both;
  }

  .btn:nth-child(1) { animation-delay: 0.05s; }
  .btn:nth-child(2) { animation-delay: 0.12s; }
  .btn:nth-child(3) { animation-delay: 0.19s; }
  .btn:nth-child(4) { animation-delay: 0.26s; }
  .btn:nth-child(5) { animation-delay: 0.33s; }

  /* Shimmer on hover */
  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.04) 50%, transparent 60%);
    transform: translateX(-100%);
    transition: transform 0.4s ease;
  }

  .btn:hover::before { transform: translateX(100%); }

  /* Color flash line */
  .btn::after {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 14px 0 0 14px;
    transition: opacity 0.2s;
    opacity: 0;
  }

  .btn:hover { transform: translateY(-2px); }

  /* Per-platform colors */
  .btn-tiktok:hover    { border-color: var(--tiktok);    box-shadow: 0 8px 30px rgba(255,0,80,0.18); }
  .btn-tiktok::after   { background: var(--tiktok); }
  .btn-tiktok:hover::after { opacity: 1; }

  .btn-telegram:hover  { border-color: var(--telegram);  box-shadow: 0 8px 30px rgba(38,165,228,0.18); }
  .btn-telegram::after { background: var(--telegram); }
  .btn-telegram:hover::after { opacity: 1; }

  .btn-youtube:hover   { border-color: var(--youtube);   box-shadow: 0 8px 30px rgba(255,0,0,0.18); }
  .btn-youtube::after  { background: var(--youtube); }
  .btn-youtube:hover::after { opacity: 1; }

  .btn-instagram:hover { border-color: var(--instagram); box-shadow: 0 8px 30px rgba(225,48,108,0.18); }
  .btn-instagram::after{ background: var(--instagram); }
  .btn-instagram:hover::after { opacity: 1; }

  .btn-website:hover   { border-color: var(--website);   box-shadow: 0 8px 30px rgba(232,184,75,0.22); }
  .btn-website::after  { background: var(--website); }
  .btn-website:hover::after { opacity: 1; }

  /* Icon circle */
  .icon-wrap {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: transform 0.2s ease;
  }

  .btn:hover .icon-wrap { transform: scale(1.1); }

  .btn-tiktok    .icon-wrap { background: rgba(255,0,80,0.12); }
  .btn-telegram  .icon-wrap { background: rgba(38,165,228,0.12); }
  .btn-youtube   .icon-wrap { background: rgba(255,0,0,0.12); }
  .btn-instagram .icon-wrap { background: rgba(225,48,108,0.12); }
  .btn-website   .icon-wrap { background: rgba(232,184,75,0.12); }

  .icon-wrap svg { width: 20px; height: 20px; }

  .btn-label {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .btn-label span { font-size: 13px; color: var(--muted); font-weight: 400; }

  .arrow {
    color: var(--muted);
    font-size: 16px;
    transition: transform 0.2s ease, color 0.2s ease;
  }

  .btn:hover .arrow { transform: translateX(3px); color: var(--white); }

  /* ── FOOTER ── */
  .footer {
    margin-top: 40px;
    font-size: 11px;
    color: rgba(245,245,240,0.2);
    letter-spacing: 0.08em;
    text-align: center;
    animation: fadeUp 1s ease both;
    animation-delay: 0.5s;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
